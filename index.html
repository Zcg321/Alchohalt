<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      [A11Y-VIEWPORT-ZOOM] WCAG 1.4.4 (Resize Text) requires that users
      can zoom up to 200% without loss of content. The previous viewport
      tag locked maximum-scale=1 + user-scalable=no, which blocks
      pinch-zoom on mobile browsers and the system text-size override.
      Dropped both — now users with low vision can zoom on iOS Safari /
      Chrome / Edge web. Capacitor's WebView handles native font-size
      preferences independently of this meta.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!--
      [R19-5] Content-Security-Policy fallback for hosts that don't
      apply the vercel.json header (Capacitor WebView, file://, local
      static-server smoke). The Vercel header is the authoritative one
      and overrides this for the production web origin. Keep the two
      in sync.

      style-src needs 'unsafe-inline' for the splash <style> in this
      file + Tailwind's runtime style injection. script-src is 'self'
      only — the inline loader-removal script was moved to main.tsx
      in this round so no inline-script allowance is needed.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://*.supabase.in https://*.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; manifest-src 'self'; worker-src 'self'" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      [PERF-PRECONNECT-ROUND-4] Dropped fonts.googleapis.com /
      fonts.gstatic.com / dns-prefetch. The app uses system-stack
      Inter via the inline @media style below — there's no Google
      Fonts request to "preconnect" to. Each preconnect costs a
      DNS+TCP+TLS handshake the user pays for on every cold load
      regardless of whether the resource is fetched. Same-origin
      Vercel assets are already covered by the document fetch.
      Crisis-line URLs (988lifeline.org / samhsa.gov / etc.) are
      hand-tap targets — preconnecting them on every cold load is
      a steady cost for an unlikely benefit; skipped.
    -->


    <!-- iOS PWA optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alchohalt" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-1024.png" />
    
    <!-- Android PWA optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Alchohalt" />
    
    <!-- Theme colors for light/dark with better contrast -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#5A8073" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#3D4F7A" />
    <meta name="msapplication-navbutton-color" content="#5A8073" />
    
    <!-- SEO and social optimization -->
    <meta name="description" content="A calm alcohol tracker. No ads. No analytics. Trust receipt included. Real crisis support when you need it." />
    <meta name="keywords" content="alcohol tracker, sobriety, recovery, calm, crisis support, mindful drinking, no ads, no analytics, private" />
    <meta name="author" content="Alchohalt" />

    <!--
      [PERF-PRECONNECT-ROUND-4] Dropped the dns-prefetch (fonts.googleapis.com
      isn't fetched anywhere) and the icon-512.png prefetch. The 512 icon is
      used only as an apple-touch-startup-image / PWA-install asset; the
      regular cold-load path does NOT request it, so prefetching it pulls
      28 KB of bytes on every cold load that the user only needs at home-
      screen-install time.
    -->


    <!--
      [BUG-FOUC-SPLASH] Inline critical CSS for the cold-load splash.
      Tailwind ships in the bundle and isn't available until hydration,
      so the splash chrome MUST be styled here or the user sees serif
      "Alchohalt" on white before the bundle arrives. Brand tokens
      mirror the Sprint 2A design system: sage / cream / indigo / ink.
    -->
    <style>
      :root {
        --alch-cream: #F8F5F0;
        --alch-sage: #5A8073;
        --alch-indigo: #3D4F7A;
        --alch-ink: #2A3239;
        --alch-ink-soft: #6B7480;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --alch-cream: #1F2A30;
          --alch-ink: #F8F5F0;
          --alch-ink-soft: #B0B7BF;
        }
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--alch-cream);
        color: var(--alch-ink);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        background: var(--alch-cream);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        transition: opacity 280ms ease-out;
      }
      #initial-loader[data-fade] {
        opacity: 0;
        pointer-events: none;
      }
      .alch-splash-inner {
        text-align: center;
      }
      .alch-splash-spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 3px solid rgba(90, 128, 115, 0.18);
        border-top-color: var(--alch-sage);
        animation: alch-spin 1.1s linear infinite;
      }
      .alch-splash-wordmark {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--alch-sage);
        margin: 0;
      }
      .alch-splash-tagline {
        font-size: 13px;
        color: var(--alch-ink-soft);
        margin: 6px 0 0;
      }
      @keyframes alch-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .alch-splash-spinner { animation: none; opacity: 0.7; }
      }
    </style>

    <title>Alchohalt — A calm alcohol tracker. No ads. No analytics.</title>
  </head>
  <body>
    <!-- Cold-load splash. Styled inline above so the pre-hydration view
         visually matches the post-hydration app instead of showing
         serif fallback text on white. Removed by the bundle on load. -->
    <div id="initial-loader" role="status" aria-live="polite">
      <div class="alch-splash-inner">
        <div class="alch-splash-spinner" aria-hidden="true"></div>
        <p class="alch-splash-wordmark">alchohalt</p>
        <p class="alch-splash-tagline">No ads. No analytics. Yours.</p>
      </div>
    </div>

    <!-- App root -->
    <div id="root"></div>

    <!--
      [R19-5] Loader removal moved into main.tsx to keep this file
      script-tag-clean (script-src 'self', no inline scripts). The
      bundle removes #initial-loader after first React paint via the
      same announceAppReady() handshake.
    -->

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
