<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- iOS PWA optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alchohalt" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-1024.png" />
    
    <!-- Android PWA optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Alchohalt" />
    
    <!-- Theme colors for light/dark with better contrast -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#5A8073" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#3D4F7A" />
    <meta name="msapplication-navbutton-color" content="#5A8073" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- SEO and social optimization -->
    <meta name="description" content="A calm alcohol tracker. No streaks-leaderboards. Real crisis support when you need it." />
    <meta name="keywords" content="alcohol tracker, sobriety, recovery, calm, crisis support, mindful drinking" />
    <meta name="author" content="Alchohalt" />

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="prefetch" href="/icons/icon-512.png" />

    <!--
      [BUG-FOUC-SPLASH] Inline critical CSS for the cold-load splash.
      Tailwind ships in the bundle and isn't available until hydration,
      so the splash chrome MUST be styled here or the user sees serif
      "Alchohalt" on white before the bundle arrives. Brand tokens
      mirror the Sprint 2A design system: sage / cream / indigo / ink.
    -->
    <style>
      :root {
        --alch-cream: #F8F5F0;
        --alch-sage: #5A8073;
        --alch-indigo: #3D4F7A;
        --alch-ink: #2A3239;
        --alch-ink-soft: #6B7480;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --alch-cream: #1F2A30;
          --alch-ink: #F8F5F0;
          --alch-ink-soft: #B0B7BF;
        }
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--alch-cream);
        color: var(--alch-ink);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        background: var(--alch-cream);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        transition: opacity 280ms ease-out;
      }
      #initial-loader[data-fade] {
        opacity: 0;
        pointer-events: none;
      }
      .alch-splash-inner {
        text-align: center;
      }
      .alch-splash-spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 3px solid rgba(90, 128, 115, 0.18);
        border-top-color: var(--alch-sage);
        animation: alch-spin 1.1s linear infinite;
      }
      .alch-splash-wordmark {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--alch-sage);
        margin: 0;
      }
      .alch-splash-tagline {
        font-size: 13px;
        color: var(--alch-ink-soft);
        margin: 6px 0 0;
      }
      @keyframes alch-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .alch-splash-spinner { animation: none; opacity: 0.7; }
      }
    </style>

    <title>Alchohalt — A calm alcohol tracker</title>
  </head>
  <body>
    <!-- Cold-load splash. Styled inline above so the pre-hydration view
         visually matches the post-hydration app instead of showing
         serif fallback text on white. Removed by the bundle on load. -->
    <div id="initial-loader" role="status" aria-live="polite">
      <div class="alch-splash-inner">
        <div class="alch-splash-spinner" aria-hidden="true"></div>
        <p class="alch-splash-wordmark">alchohalt</p>
        <p class="alch-splash-tagline">A calm alcohol tracker.</p>
      </div>
    </div>

    <!-- App root -->
    <div id="root"></div>

    <!-- Remove loader when app loads -->
    <script>
      window.addEventListener('load', function () {
        var loader = document.getElementById('initial-loader');
        if (!loader) return;
        loader.setAttribute('data-fade', 'true');
        setTimeout(function () { loader.remove(); }, 320);
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
