name: Deploy legal pages

# Publishes docs/legal/*.md as a static site at
#   https://zcg321.github.io/alchohalt/
# so the App Store + Play Store submissions can reference stable
# public URLs (privacy policy, ToS, EULA, subscription terms, consumer
# health data policy).
#
# Repo must be public (or owner on GitHub Pro) for the site to be
# reachable. Owner action: Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'docs/legal/**'
      - 'tools/legal/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: pip install markdown==3.6

      - name: Render legal pages
        run: python tools/legal/build_site.py

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _legal_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
