name: PR Checks
permissions:
  contents: read

on:
  pull_request:
    branches: [ main, master ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      # [R11-CI-FIX-2] npm/cli#4828: rollup/esbuild platform-specific
      # binaries skip install on `npm ci` runners. `npm rebuild` alone
      # is insufficient (PR-43 first run proved it). Explicitly
      # install the linux-x64 binaries with --no-save then rebuild.
      - name: Force-install platform-specific native binaries
        run: |
          npm install --no-save @rollup/rollup-linux-x64-gnu @esbuild/linux-x64 || true
          npm rebuild rollup esbuild

      - name: Verify (typecheck + lint + test)
        run: npm run verify
      
      - name: Security audit
        run: npm run audit:ci
      
      - name: Build
        run: npm run build
      
      - name: Coverage check (enforced)
        run: |
          npm run test:ci
          npm run coverage:check
          
      - name: Verify coverage threshold
        run: npm run test -- --coverage --reporter=default --coverage.thresholdAutoUpdate=false
