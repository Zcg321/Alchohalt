name: PR Checks
permissions:
  contents: read

on:
  pull_request:
    branches: [ main, master ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      # [R11-CI-FIX-2] npm/cli#4828: rollup/esbuild platform-specific
      # binaries skip install on `npm ci` runners. `npm rebuild` alone
      # is insufficient (PR-43 first run proved it). Explicitly
      # install the linux-x64 binaries with --no-save then rebuild.
      - name: Force-install platform-specific native binaries
        run: |
          npm install --no-save @rollup/rollup-linux-x64-gnu @esbuild/linux-x64 || true
          npm rebuild rollup esbuild

      - name: Verify (typecheck + lint + test)
        run: npm run verify
      
      - name: Security audit
        run: npm run audit:ci
      
      - name: Build
        run: npm run build

      # [R13-D] Bundle-size guard. Fails the PR on any bundle
      # regression past the round-13 re-baseline (250 / 335 KB gz).
      # Previously this lived only in repo-health-strict (post-merge),
      # which let bundle bloat through silently. See
      # tools/check_bundle_budget.cjs for the budget rationale.
      - name: Bundle size check (R13 budgets — fails on regression)
        run: npm run size:check

      # [R13-5] Perf-baseline regression guard. Compares the current
      # build's bundle metrics against the committed perf-baseline.json
      # and fails if any regress > 5%. Re-baseline on every merge to
      # main via `npm run perf-baseline:update`.
      - name: Perf baseline check (R13 — fails on >5% regression)
        run: npm run perf-baseline

      # [R14-A/B] Meta-guard: test the guards themselves. If
      # check_bundle_budget.cjs or perf_baseline.cjs ever stops
      # exiting non-zero on a regression, those tools become silent
      # passes — a worse failure mode than not having them at all.
      # These tests synthesize over-budget / regressed dist/ folders
      # and assert the scripts fail loudly.
      - name: Tool tests (R14 — verifies guards actually trigger)
        run: npm run test:tools

      - name: Coverage check (enforced)
        run: |
          npm run test:ci
          npm run coverage:check
          
      - name: Verify coverage threshold
        run: npm run test -- --coverage --reporter=default --coverage.thresholdAutoUpdate=false
