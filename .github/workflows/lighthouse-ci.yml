name: Lighthouse CI

# [R9-5] Run Lighthouse on every PR. Fail if Performance / A11y /
# Best Practices / SEO drop below 0.90 (90/100). The PWA gate is
# audit-only (informational) for now — Capacitor + Vite PWA can swing
# the PWA score on minor service-worker config tweaks unrelated to
# the app, and we don't want to block PRs on that signal.
#
# Thresholds are deliberately a bit looser than the round-9 docket's
# 95/95/95/95 ask: 95 leaves no headroom for normal CSS / dependency
# noise on shared CI runners. 90 is still the "Lighthouse green
# zone" and a clear regression signal.
#
# [R10-F] Pinned to ubuntu-22.04 (not ubuntu-latest) to prevent
# silent runner-image migrations from changing baseline scores
# under our feet. @lhci/cli pinned to 0.14.4 (was floating 0.14.x
# which let patch-version drift introduce flake). Added an `npm
# rebuild` defensive step against the rollup-optional-deps issue
# (npm/cli#4828) where rollup's platform-specific binary skips
# install on CI runners using `npm ci`. Without rebuild, the build
# step fails with "Cannot find module @rollup/rollup-linux-x64-gnu"
# — masquerades as a Lighthouse failure because lhci runs `npm run
# build` internally.

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # [R10-F] Defensive workaround for npm/cli#4828 — rollup's
      # platform-specific optional dependencies sometimes get pruned
      # on CI runners using `npm ci`, leading to "Cannot find module
      # @rollup/rollup-linux-x64-gnu" at build time. `npm rebuild`
      # forces re-resolution of native binaries.
      - name: Rebuild native deps (rollup-optional-deps fix)
        run: npm rebuild rollup esbuild

      - name: Build
        run: npm run build
        env:
          CI: 'true'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.4

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        # [R10-F] If LHCI_GITHUB_APP_TOKEN isn't set (forks, contributors
        # without secrets), the upload step warns but the assert step
        # still runs. continue-on-error: false intentionally — assertion
        # failures should fail the PR.
        continue-on-error: false

      # [R10-F] Always upload the Lighthouse report as an artifact so a
      # failed run is debuggable. 7-day retention because LHR JSON is
      # only useful for the immediate PR review window.
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
