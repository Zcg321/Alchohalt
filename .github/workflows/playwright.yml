name: Playwright persona walkthroughs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run persona walkthroughs
        run: npx playwright test
        env:
          CI: '1'

      # [R8-B] Component visual-regression gallery is shipped but
      # gated behind GALLERY_SNAPSHOT=1 — baselines need to be
      # generated on Linux CI first. Run locally on a clean Linux
      # checkout: `GALLERY_SNAPSHOT=1 npx playwright test
      # component-gallery --update-snapshots`, commit the resulting
      # PNGs to e2e/component-gallery.spec.ts-snapshots/, then
      # uncomment the step below to enable per-PR regression checks.
      #
      # - name: Component-gallery visual regression
      #   run: npx playwright test component-gallery
      #   env: { CI: '1', GALLERY_SNAPSHOT: '1' }
      #
      # Until baselines exist, the DOM-snapshot path
      # (src/components/__tests__/visual-regression.test.tsx) runs
      # under vitest and catches structural regressions today.

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-screenshots
          path: e2e/screenshots/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
